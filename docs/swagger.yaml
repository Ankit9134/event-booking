openapi: 3.0.0
info:
  title: Event Booking System API
  version: 1.0.0
  description: API for managing events, users, and ticket bookings

servers:
  - url: https://event-booking-ksn8.onrender.com/api/
    # description: Development server

paths:
  # Event endpoints
  /events:
    get:
      summary: Get all upcoming events
      tags:
        - Events
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'
    post:
      summary: Create a new event
      tags:
        - Events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - date
                - total_capacity
              properties:
                title:
                  type: string
                  example: "Tech Conference 2024"
                description:
                  type: string
                  example: "Annual tech conference"
                date:
                  type: string
                  format: date-time
                  example: "2024-12-15"
                total_capacity:
                  type: integer
                  example: 100
      responses:
        '201':
          description: Event created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Booking endpoints
  /bookings:
    post:
      summary: Book tickets for an event
      tags:
        - Bookings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - event_id
              properties:
                user_id:
                  type: integer
                  example: 1
                event_id:
                  type: integer
                  example: 1
                number_of_tickets:
                  type: integer
                  default: 1
                  example: 2
      responses:
        '201':
          description: Booking created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      booking_code:
                        type: string
                      user_id:
                        type: integer
                      event_id:
                        type: integer
                      number_of_tickets:
                        type: integer
                      event_title:
                        type: string
                      event_date:
                        type: string
        '400':
          description: No tickets available or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /events/{id}/attendance:
    post:
      summary: Mark attendance for an event using booking code
      tags:
        - Bookings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Event ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - booking_code
              properties:
                booking_code:
                  type: string
                  example: "BKG-ABC12345"
      responses:
        '200':
          description: Attendance marked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      booking_code:
                        type: string
                      user_name:
                        type: string
                      user_email:
                        type: string
                      event_title:
                        type: string
                      event_id:
                        type: integer
                      number_of_tickets:
                        type: integer
                      total_tickets_booked_by_user:
                        type: integer
                      entry_time:
                        type: string
                        format: date-time
        '400':
          description: Invalid booking code, event mismatch, or attendance already marked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Event or booking not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # User endpoints
  /users:
    get:
      summary: Get all users
      tags:
        - Users
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
    post:
      summary: Create a new user
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
              properties:
                name:
                  type: string
                  example: "John Doe"
                email:
                  type: string
                  format: email
                  example: "john@example.com"
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation error or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{id}/bookings:
    get:
      summary: Get all bookings for a specific user
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: User ID
      responses:
        '200':
          description: List of user bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
        '404':
          description: User not found

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        created_at:
          type: string
          format: date-time
    
    Event:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        # date:
        #   type: string
        #   format: date-time
        total_capacity:
          type: integer
        remaining_tickets:
          type: integer
    
    Booking:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        event_id:
          type: integer
        booking_code:
          type: string
        number_of_tickets:
          type: integer
        booking_date:
          type: string
          format: date-time
        title:
          type: string
        date:
          type: string
          format: date-time
    Attendance:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        event_id:
          type: integer
        booking_id:
          type: string
        entry_date:
          type: string
          format: date-time
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
    
    ErrorResponse:
      type: object
      properties:
        error:
          type: string